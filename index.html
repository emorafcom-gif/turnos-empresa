<script>

let personas = JSON.parse(localStorage.getItem("turnosCircular")) || [];
let editandoIndex = null;

function guardar(){
    localStorage.setItem("turnosCircular", JSON.stringify(personas));
}

function minutos(hora){
    let [h,m]=hora.split(":");
    return parseInt(h)*60+parseInt(m);
}

function horaFin(hora){
    let total=minutos(hora)+60;
    let h=Math.floor(total/60);
    let m=total%60;
    return h.toString().padStart(2,"0")+":"+m.toString().padStart(2,"0");
}

function agregar(){
    let nombre=document.getElementById("nombre").value;
    let hora=document.getElementById("hora").value;

    if(!nombre || !hora) return;

    if(editandoIndex !== null){
        personas[editandoIndex] = {nombre,hora};
        editandoIndex = null;
    } else {
        personas.push({nombre,hora});
    }

    document.getElementById("nombre").value="";
    document.getElementById("hora").value="";

    guardar();
    render();
}

function editar(index){
    let persona = personas[index];
    document.getElementById("nombre").value = persona.nombre;
    document.getElementById("hora").value = persona.hora;
    editandoIndex = index;
}

function eliminar(index){
    if(confirm("¿Eliminar esta colación?")){
        personas.splice(index,1);
        guardar();
        render();
    }
}

function render(){
    const contenedor=document.getElementById("contenedor");
    contenedor.innerHTML="";

    let ahora=new Date();
    let actualMin=ahora.getHours()*60+ahora.getMinutes();

    personas
    .sort((a,b)=>minutos(a.hora)-minutos(b.hora))
    .forEach((p,index)=>{

        let inicio=minutos(p.hora);
        let fin=inicio+60;

        let restante=fin-actualMin;
        let porcentaje=Math.max(0,Math.min(60,restante));
        let progreso=(porcentaje/60);

        let radio=90;
        let circunferencia=2*Math.PI*radio;
        let offset=circunferencia*(1-progreso);

        let estadoTexto =
            actualMin < inicio ? "Pendiente" :
            actualMin >= inicio && actualMin < fin ? restante+" min" :
            "Finalizado";

        let card=document.createElement("div");
        card.className="card";

        card.innerHTML=`
            <div class="nombre">${p.nombre}</div>
            <div>${p.hora} - ${horaFin(p.hora)}</div>

            <div class="circle">
                <svg width="200" height="200">
                    <circle class="bg" cx="100" cy="100" r="${radio}"></circle>
                    <circle class="progress" cx="100" cy="100" r="${radio}"
                        stroke-dasharray="${circunferencia}"
                        stroke-dashoffset="${offset}">
                    </circle>
                </svg>
                <div class="time">${estadoTexto}</div>
            </div>

            <div style="margin-top:15px;">
                <button onclick="editar(${index})" style="background:#3b82f6;color:white;">Editar</button>
                <button onclick="eliminar(${index})" style="background:#ef4444;color:white;">Eliminar</button>
            </div>
        `;

        if(actualMin>=inicio && actualMin<fin){
            card.style.boxShadow="0 0 30px #22c55e";
        }

        contenedor.appendChild(card);
    });
}

setInterval(render,1000);
render();

</script>
